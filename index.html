<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiny Steps｜小步一下</title>
  <meta name="description" content="Tiny Steps 是一个温柔的任务拆解网页，把混乱的事情拆成一个能开始的小动作。" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="aurora" aria-hidden="true">
    <span class="orb orb-a"></span>
    <span class="orb orb-b"></span>
    <span class="orb orb-c"></span>
    <span class="grid-glow"></span>
  </div>

  <main class="shell">
    <section class="hero" aria-labelledby="page-title">
      <div class="eyebrow">Tiny Steps</div>
      <h1 id="page-title">把卡住的事，拆成一个能开始的小动作。</h1>
      <p class="lead">不催你立刻变高效。先看见阻力，再把任务变轻、变清楚、变得可以开始。</p>
    </section>

    <section class="workspace" aria-label="任务拆解器">
      <div class="panel input-panel">
        <div class="panel-head">
          <p class="label">Step 01</p>
          <h2>你现在卡在哪件事上？</h2>
        </div>

        <label class="task-field" for="taskInput">
          <span>写下一个任务，越真实越好</span>
          <textarea id="taskInput" rows="4" placeholder="例如：我要复习解剖，但内容太多，不知道从哪里开始。"></textarea>
        </label>

        <div class="field-group">
          <p class="field-title">主要阻力</p>
          <div class="choice-grid" id="blockerChoices">
            <button class="choice is-active" data-value="too-big">任务太大</button>
            <button class="choice" data-value="cant-start">开始不了</button>
            <button class="choice" data-value="fear">怕做不好</button>
            <button class="choice" data-value="low-energy">太累了</button>
            <button class="choice" data-value="messy">脑子很乱</button>
            <button class="choice" data-value="little-time">时间太少</button>
          </div>
        </div>

        <div class="field-group two-col">
          <div>
            <p class="field-title">当前能量</p>
            <div class="segmented" id="energyChoices">
              <button class="segment is-active" data-value="soft">很低</button>
              <button class="segment" data-value="steady">普通</button>
              <button class="segment" data-value="deep">还可以认真做</button>
            </div>
          </div>
          <div>
            <p class="field-title">任务类型</p>
            <select id="taskType" aria-label="任务类型">
              <option value="auto">自动判断</option>
              <option value="study">学习 / 复习</option>
              <option value="writing">写作 / 论文 / 报告</option>
              <option value="life">生活整理</option>
              <option value="creative">创作 / 项目</option>
              <option value="admin">杂事 / 事务</option>
            </select>
          </div>
        </div>

        <div class="actions">
          <button class="primary-btn" id="generateBtn">生成小步</button>
          <button class="ghost-btn" id="exampleBtn">放入示例</button>
        </div>
      </div>

      <div class="panel result-panel">
        <div class="panel-head">
          <p class="label">Step 02</p>
          <h2>今天只需要走到这里</h2>
        </div>

        <div class="result-empty" id="emptyState">
          <div class="breathing-dot"></div>
          <p>输入任务后，我会把它拆成三个层级：立刻开始、十分钟推进、完成感收尾。</p>
        </div>

        <div class="result" id="result" hidden>
          <div class="result-intro" id="resultIntro"></div>
          <div class="step-card start">
            <span class="step-kicker">2 分钟启动</span>
            <h3 id="stepOneTitle"></h3>
            <p id="stepOneText"></p>
          </div>
          <div class="step-card focus">
            <span class="step-kicker">10 分钟推进</span>
            <h3 id="stepTwoTitle"></h3>
            <p id="stepTwoText"></p>
          </div>
          <div class="step-card finish">
            <span class="step-kicker">完成感收尾</span>
            <h3 id="stepThreeTitle"></h3>
            <p id="stepThreeText"></p>
          </div>

          <div class="result-actions">
            <button class="ghost-btn" id="lighterBtn">更轻一点</button>
            <button class="ghost-btn" id="specificBtn">更具体一点</button>
            <button class="ghost-btn" id="saveBtn">保存这次</button>
          </div>
        </div>
      </div>
    </section>

    <section class="history-wrap" aria-label="最近的小步记录">
      <div class="section-title">
        <p class="label">Step 03</p>
        <h2>最近拆过的小步</h2>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>
  </main>

  <template id="historyTemplate">
    <article class="history-item">
      <p class="history-task"></p>
      <div class="history-meta"></div>
      <button class="reuse-btn">重新放入</button>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
